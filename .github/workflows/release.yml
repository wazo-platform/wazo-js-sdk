name: Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      # Node 24 (.nvmrc) bundles npm 11.x (>= 11.5.1 required for trusted publishing),
      # so no npm upgrade step is needed. npm >= 12 is currently broken for publish.
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run test
      - run: pnpm publish --no-git-checks
